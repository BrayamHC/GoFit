<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <!-- Fondo degradado oscuro -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0000;stop-opacity:1" />
    </linearGradient>

    <!-- Glow rojo -->
    <radialGradient id="redGlow" cx="75%" cy="30%" r="45%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0" />
    </radialGradient>

    <!-- Glow sutil izquierda -->
    <radialGradient id="leftGlow" cx="10%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:0" />
    </radialGradient>

    <!-- Textura de ruido para profundidad -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Stroke dash para lineas decorativas -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#dc2626;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#ef4444;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- ── BASE ── -->
  <rect width="1440" height="900" fill="url(#bgGrad)" />
  <rect width="1440" height="900" fill="url(#redGlow)" />
  <rect width="1440" height="900" fill="url(#leftGlow)" />

  <!-- ── GRID PERSPECTIVA (piso de gym) ── -->
  <!-- líneas horizontales perspectiva -->
  <g opacity="0.07" stroke="#dc2626" stroke-width="0.8">
    <line x1="0" y1="620" x2="1440" y2="620"/>
    <line x1="0" y1="660" x2="1440" y2="660"/>
    <line x1="0" y1="700" x2="1440" y2="700"/>
    <line x1="0" y1="740" x2="1440" y2="740"/>
    <line x1="0" y1="780" x2="1440" y2="780"/>
    <line x1="0" y1="820" x2="1440" y2="820"/>
    <line x1="0" y1="860" x2="1440" y2="860"/>
    <line x1="0" y1="900" x2="1440" y2="900"/>
  </g>
  <!-- líneas verticales perspectiva convergente -->
  <g opacity="0.06" stroke="#dc2626" stroke-width="0.8">
    <line x1="720" y1="520" x2="0"    y2="900"/>
    <line x1="720" y1="520" x2="160"  y2="900"/>
    <line x1="720" y1="520" x2="320"  y2="900"/>
    <line x1="720" y1="520" x2="480"  y2="900"/>
    <line x1="720" y1="520" x2="640"  y2="900"/>
    <line x1="720" y1="520" x2="800"  y2="900"/>
    <line x1="720" y1="520" x2="960"  y2="900"/>
    <line x1="720" y1="520" x2="1120" y2="900"/>
    <line x1="720" y1="520" x2="1280" y2="900"/>
    <line x1="720" y1="520" x2="1440" y2="900"/>
  </g>

  <!-- ── HEXÁGONOS DECORATIVOS (pattern gym) ── -->
  <!-- Hex grande derecha superior -->
  <polygon points="1200,60 1260,95 1260,165 1200,200 1140,165 1140,95"
           fill="none" stroke="#dc2626" stroke-width="1" opacity="0.12"/>
  <polygon points="1200,75 1248,102 1248,158 1200,185 1152,158 1152,102"
           fill="url(#hexGrad)" stroke="#dc2626" stroke-width="0.5" opacity="0.15"/>

  <!-- Hex mediano derecha -->
  <polygon points="1340,200 1380,223 1380,269 1340,292 1300,269 1300,223"
           fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.1"/>

  <!-- Hex pequeño derecha arriba -->
  <polygon points="1100,20 1130,37 1130,71 1100,88 1070,71 1070,37"
           fill="none" stroke="#dc2626" stroke-width="0.8" opacity="0.1"/>

  <!-- Hex izquierda inferior -->
  <polygon points="120,700 170,729 170,787 120,816 70,787 70,729"
           fill="none" stroke="#dc2626" stroke-width="1" opacity="0.1"/>
  <polygon points="120,715 158,737 158,780 120,802 82,780 82,737"
           fill="url(#hexGrad)" stroke="#dc2626" stroke-width="0.5" opacity="0.1"/>

  <!-- Hex micro derecha inferior -->
  <polygon points="1350,750 1380,767 1380,801 1350,818 1320,801 1320,767"
           fill="none" stroke="#ef4444" stroke-width="0.8" opacity="0.09"/>

  <!-- ── MANCUERNA IZQUIERDA (silueta vectorial) ── -->
  <g opacity="0.06" fill="#dc2626">
    <!-- barra central -->
    <rect x="40" y="195" width="180" height="12" rx="6"/>
    <!-- peso izquierdo exterior -->
    <rect x="20"  y="178" width="28" height="46" rx="5"/>
    <!-- peso izquierdo interior -->
    <rect x="52"  y="183" width="20" height="36" rx="4"/>
    <!-- peso derecho interior -->
    <rect x="188" y="183" width="20" height="36" rx="4"/>
    <!-- peso derecho exterior -->
    <rect x="212" y="178" width="28" height="46" rx="5"/>
  </g>

  <!-- ── BARRA OLÍMPICA DERECHA (diagonal decorativa) ── -->
  <g opacity="0.05" fill="#ef4444" transform="rotate(-15, 1200, 400)">
    <!-- barra -->
    <rect x="1050" y="385" width="320" height="8" rx="4"/>
    <!-- disco izq exterior -->
    <rect x="1040" y="362" width="18" height="54" rx="4"/>
    <!-- disco izq interior -->
    <rect x="1062" y="368" width="12" height="42" rx="3"/>
    <!-- disco der interior -->
    <rect x="1346" y="368" width="12" height="42" rx="3"/>
    <!-- disco der exterior -->
    <rect x="1362" y="362" width="18" height="54" rx="4"/>
  </g>

  <!-- ── LÍNEAS DECORATIVAS ROJAS (energía) ── -->
  <!-- línea principal superior -->
  <line x1="0" y1="88" x2="1440" y2="88" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.9"/>
  <line x1="0" y1="92" x2="1440" y2="92" stroke="url(#lineGrad2)" stroke-width="0.5" opacity="0.7"/>

  <!-- línea inferior -->
  <line x1="0" y1="812" x2="1440" y2="812" stroke="url(#lineGrad)" stroke-width="1" opacity="0.5"/>

  <!-- línea diagonal izquierda -->
  <line x1="0" y1="300" x2="400" y2="0" stroke="#dc2626" stroke-width="0.7" opacity="0.08"/>
  <line x1="0" y1="450" x2="500" y2="0" stroke="#dc2626" stroke-width="0.5" opacity="0.05"/>

  <!-- línea diagonal derecha -->
  <line x1="1440" y1="200" x2="1100" y2="600" stroke="#dc2626" stroke-width="0.7" opacity="0.08"/>
  <line x1="1440" y1="350" x2="1050" y2="700" stroke="#dc2626" stroke-width="0.5" opacity="0.05"/>

  <!-- ── PUNTOS / DOTS PATTERN ── -->
  <g fill="#ffffff" opacity="0.03">
    <!-- columna 1 -->
    <circle cx="80"  cy="150" r="2"/><circle cx="80"  cy="220" r="2"/>
    <circle cx="80"  cy="290" r="2"/><circle cx="80"  cy="360" r="2"/>
    <circle cx="80"  cy="430" r="2"/><circle cx="80"  cy="500" r="2"/>
    <!-- columna 2 -->
    <circle cx="160" cy="150" r="2"/><circle cx="160" cy="220" r="2"/>
    <circle cx="160" cy="290" r="2"/><circle cx="160" cy="360" r="2"/>
    <circle cx="160" cy="430" r="2"/><circle cx="160" cy="500" r="2"/>
    <!-- columna derecha 1 -->
    <circle cx="1280" cy="150" r="2"/><circle cx="1280" cy="220" r="2"/>
    <circle cx="1280" cy="290" r="2"/><circle cx="1280" cy="360" r="2"/>
    <circle cx="1280" cy="430" r="2"/><circle cx="1280" cy="500" r="2"/>
    <!-- columna derecha 2 -->
    <circle cx="1360" cy="150" r="2"/><circle cx="1360" cy="220" r="2"/>
    <circle cx="1360" cy="290" r="2"/><circle cx="1360" cy="360" r="2"/>
    <circle cx="1360" cy="430" r="2"/><circle cx="1360" cy="500" r="2"/>
  </g>

  <!-- ── LOGO / MARCA DE AGUA WATERMARK ── -->
  <text x="720" y="490" 
        font-family="Arial Black, Arial, sans-serif"
        font-size="180" font-weight="900"
        text-anchor="middle"
        fill="#dc2626" opacity="0.025"
        letter-spacing="-8">
    GO FIT
  </text>

  <!-- ── ACCENT CORNER TOP RIGHT ── -->
  <polygon points="1440,0 1440,120 1320,0" fill="#dc2626" opacity="0.08"/>
  <polygon points="1440,0 1440,60 1380,0"  fill="#dc2626" opacity="0.06"/>

  <!-- ── ACCENT CORNER BOTTOM LEFT ── -->
  <polygon points="0,900 0,780 120,900" fill="#dc2626" opacity="0.07"/>
  <polygon points="0,900 0,840 60,900"  fill="#dc2626" opacity="0.05"/>

  <!-- ── PULSE CIRCLES (energía/vitalidad) ── -->
  <circle cx="1200" cy="130" r="80"  fill="none" stroke="#dc2626" stroke-width="1" opacity="0.06"/>
  <circle cx="1200" cy="130" r="110" fill="none" stroke="#dc2626" stroke-width="0.6" opacity="0.04"/>
  <circle cx="1200" cy="130" r="140" fill="none" stroke="#dc2626" stroke-width="0.4" opacity="0.025"/>

  <circle cx="200"  cy="750" r="60"  fill="none" stroke="#dc2626" stroke-width="0.8" opacity="0.05"/>
  <circle cx="200"  cy="750" r="90"  fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.03"/>

  <!-- ── BORDE SUPERIOR ACCENT ── -->
  <rect x="0" y="0" width="1440" height="3" fill="#dc2626" opacity="0.6"/>
</svg>